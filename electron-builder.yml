appId: com.smallcaps.terminal
productName: SmallCaps Terminal
copyright: Copyright © 2026

directories:
  output: dist-electron
  buildResources: electron/resources

files:
  - ".next/standalone/**/*"
  - ".next/static/**/*"
  - "public/**/*"
  - "electron/main.js"
  - "node_modules/next/dist/bin/next"
  - "package.json"

extraResources:
  - from: ".next/standalone"
    to: "app"
    filter:
      - "**/*"
  - from: ".next/static"
    to: "app/.next/static"
    filter:
      - "**/*"
  - from: "public"
    to: "app/public"
    filter:
      - "**/*"

mac:
  category: public.app-category.finance
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: "${productName}-${version}-${os}-setup.${ext}"

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Finance
  artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
